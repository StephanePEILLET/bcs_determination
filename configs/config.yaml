# Configuration parameter for BCS Determination Classification
defaults:
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe

seed: 42
model_name: "resnet50"
num_classes: 120
lr: 0.001
optimizer_name: "adam"
weight_decay: 1e-4

scheduler_config:
  name: "cosine_annealing"
  T_max: 20
  eta_min: 1e-6
  monitor: "val_loss"

# Regularization (anti-overfitting)
regularization:
  dropout: 0.3
  label_smoothing: 0.1
  mixup_alpha: 0.2       # Set to 0.0 to disable
  cutmix_alpha: 1.0      # Set to 0.0 to disable
  mixup_prob: 0.5        # Probability of applying mixup vs cutmix when both are enabled
  stochastic_depth: 0.1  # Drop path rate (ResNet/ViT)

data_dir: "data/stanford_dogs"
image_size: 224
batch_size: 32
num_workers: 8
val_split: 0.1          # Fraction of data for validation (stratified)
test_split: 0.1         # Fraction of data for test (stratified)
max_epochs: 100
patience: 15

# Training parameters
task: "classification" # or "segmentation"
finetuning:
  unfreeze_at_epoch: 5        # Epoch to unfreeze the backbone
  backbone_lr_multiplier: 0.1 # Multiplier for the learning rate of the backbone
log_every_n_steps: 10
val_check_interval: 1.0
precision: "16-mixed"
gradient_clip_val: 1.0  # Gradient clipping for stability

# TensorBoard logging options
use_tensorboard: true
tensorboard:
  log_graph: true                  # Log model computational graph
  log_weight_histograms: true      # Log weight/gradient histograms every N epochs
  histogram_every_n_epochs: 5
  log_images: true                 # Log sample prediction images
  log_confusion_matrix: true       # Log confusion matrix at end of each validation
  log_pr_curve: true               # Log precision-recall curves
  log_embedding: false             # Log embedding projections (heavy)
use_wandb: false
wandb_project: "bcs_determination_classification"

trainer:
  accelerator: "auto"
  devices: "auto"
  strategy: "auto"
  sync_batchnorm: false
  profiler: null
  resume_from_checkpoint: null

inference:
  checkpoint_path: null
  batch_size: 64
  save_results: true

# Hyperparameter optimization
n_trials: 10
n_epochs_per_trial: 3
timeout: null

hydra:
  sweeper:
    sampler:
      seed: ${seed}
    direction: maximize
    study_name: bcs_determination_study
    storage: null
    n_trials: ${n_trials}
    n_jobs: 1
    params:
      lr: choice(0.0001, 0.001, 0.005)
      optimizer_name: choice("adam", "sgd")
      batch_size: choice(16, 32, 64)
  run:
    dir: experiments/bcs_determination/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: experiments/bcs_determination/multirun_${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
