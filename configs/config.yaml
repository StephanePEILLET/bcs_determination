# Configuration parameter for Stanford Bcs Classification
defaults:
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe

seed: 42
model_name: "resnet50"
num_classes: 120
lr: 0.001
optimizer_name: "adam"

scheduler_config:
  name: "cosine_annealing"
  T_max: 20
  monitor: "val_loss"

data_dir: "/home/SPeillet/Downloads/stanford_bcs/images"
image_size: 224
batch_size: 32
num_workers: 8
max_epochs: 20
patience: 5

# Training parameters
log_every_n_steps: 10
val_check_interval: 1.0
precision: "16-mixed"

# Logging options
use_tensorboard: true
use_wandb: false
wandb_project: "stanford_bcs_classification"

trainer:
  accelerator: "auto"
  devices: "auto"
  strategy: "auto"
  sync_batchnorm: false
  profiler: null
  resume_from_checkpoint: null

inference:
  checkpoint_path: null
  batch_size: 64
  save_results: true

hydra:
  sweeper:
    sampler:
      seed: ${seed}
    direction: maximize
    study_name: stanford_bcs_study
    storage: null
    n_trials: ${n_trials}
    n_jobs: 1
    params:
      lr: choice(0.0001, 0.001, 0.005)
      optimizer_name: choice("adam", "sgd")
      batch_size: choice(16, 32, 64)
  run:
    dir: experiments/stanford_bcs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: experiments/stanford_bcs/multirun_${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}

# Hyperparameter optimization (if used later)
n_trials: 10
n_epochs_per_trial: 3
timeout: null
