name: bcs_analysis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio
  - pytorch-cuda=11.8 # Or 12.1 depending on the GPU
  - mkl<2025  # MKL 2025+ requires libittnotify.so (ITT API) which conflicts with PyTorch
  - ittapi  # Required by MKL for Intel ITT profiling symbols
  - pip:
    - pytorch-lightning>=2.0.0
    - torchmetrics>=0.11.0
    - hydra-core>=1.3.0
    - omegaconf>=2.3.0
    - pydantic>=2.0.0
    - wandb>=0.15.0
    - tensorboard>=2.10.0
    - rich>=13.0.0
    - matplotlib>=3.5.0
    - seaborn>=0.11.0
    - scikit-learn>=1.1.0
    - transformers>=4.30.0
    - hydra-optuna-sweeper>=1.2.0
    - fastapi>=0.100.0
    - uvicorn>=0.22.0
    - prodict>=0.8.0
    - python-multipart>=0.0.6
